<!-- 🟢 CORRECCIÓN: Se eliminó la llave '}' que rompía la condición del colapso -->
<div class="dashboard-container" [class.collapsed]="!isSidebarOpen && !isMobile">

    <!-- BOTÓN FLOTANTE MÓVIL -->
    <button (click)="toggleSidebar()" class="mobile-hamburger-btn">
        <i class="bi bi-list"></i>
    </button>

    <!-- BARRA LATERAL (SIDEBAR) -->
    <aside class="sidebar" [class.open]="isSidebarOpen && isMobile">

        <!-- CABECERA DEL SIDEBAR -->
        <div class="sidebar-header">
            <h2 class="logo-text">
                {{ (isSidebarOpen || isMobile) ? 'VISOR ASA' : 'VA' }}
            </h2>

            <!-- BOTÓN DE CONTROL PARA ESCRITORIO -->

            <button (click)="toggleSidebar()" class="toggle-btn" title="Alternar menú">
                <i class="bi bi-list" style="color: white; font-size: 1.5rem;">_</i>
            </button>

        </div>

        <div class="sidebar-content">

            @for (grupo of grupos; track grupo) {
            <div class="menu-section">

                <h3 class="menu-section-title">{{ grupo }}</h3>

                <ul class="menu-list">
                    @for (item of menusAgrupados[grupo]; track item.id) {
                    <li>
                        <a [routerLink]="item.ruta" routerLinkActive="active-link" class="menu-item">
                            <i [class]="item.icono || 'bi bi-circle'"></i>
                            <span>{{ item.nombre }}</span>
                        </a>
                    </li>
                    }
                </ul>

            </div>
            } @empty {
            <p class="text-muted" style="padding: 16px;">No tienes opciones asignadas.</p>
            }
        </div>

        <div class="sidebar-footer">
            <button (click)="onLogout()" class="logout-btn">
                <i class="bi bi-box-arrow-left"></i>
                <span>Salir</span>
            </button>
        </div>

    </aside>

    <main class="main-content">

        <!-- CABECERA SUPERIOR (TOP NAVBAR) -->
        <header class="top-navbar">
            <div class="user-profile" style="margin-left: auto;">
                <span>{{ usuarioNombre }}</span>
            </div>
        </header>

        <!-- CONTENEDOR DINÁMICO DE PÁGINAS -->
        <div class="page-container" style="flex: 1; padding: 20px; overflow-y: auto; background-color: #f8f9fa;">
            <router-outlet></router-outlet>
        </div>

    </main>
</div>
