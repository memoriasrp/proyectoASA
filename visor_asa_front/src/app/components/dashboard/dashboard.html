<div class="layout-wrapper">

    <aside class="sidebar" [ngClass]="{ 'collapsed': isSidebarOpen }">

        <div class="sidebar-header">
            <div class="logo-box">
                <span class="logo-icon">🌐</span>
                <h2 class="logo-text">Visor ASA</h2>
            </div>
            <button class="toggle-btn" (click)="toggleSidebar()">⦗⦘</button>
        </div>

        <div class="sidebar-user">
            <div class="avatar">SR</div>
            <div class="user-info">
                <p class="user-name">{{ usuarioNombre }}</p>
                <span class="user-role">Panel de Control</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            @for (item of menuItems; track item.id) {
            <a [routerLink]="item.ruta" routerLinkActive="active-link" class="nav-link">
                <span class="nav-icon">📁</span>
                <span class="nav-label">{{ item.nombre }}</span>
            </a>
            } @empty {
            <div class="sidebar-alert">Sin accesos configurados</div>
            }
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" (click)="onLogout()">
                <span class="nav-icon">🚪</span>
                <span class="nav-label">Cerrar Sesión</span>
            </button>
        </div>
    </aside>

    <div class="main-container">
        <header class="top-navbar">
            <span class="breadcrumb">Cooperativa / Sistema / Visor</span>
        </header>

        <main class="content-body">
            <router-outlet></router-outlet>
        </main>
    </div>

</div>
