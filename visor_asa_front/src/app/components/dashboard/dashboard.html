<div class="dashboard-container">

    <aside class="sidebar" [class.open]="isSidebarOpen">

        <div class="sidebar-header">
            <h2>VISOR ASA</h2>
        </div>

        <div class="sidebar-content">

            @for (grupo of grupos; track grupo) {
            <div class="menu-section">

                <h3 class="menu-section-title">{{ grupo }}</h3>

                <ul class="menu-list">
                    @for (item of menusAgrupados[grupo]; track item.id) {
                    <li>
                        <a [routerLink]="item.ruta" routerLinkActive="active-link" class="menu-item">
                            <i [class]="item.icono || 'bi bi-circle'"></i>
                            <span>{{ item.nombre }}</span>
                        </a>
                    </li>
                    }
                </ul>

            </div>
            } @empty {
            <p class="text-muted" style="padding: 16px;">No tienes opciones asignadas.</p>
            }
        </div>

        <div class="sidebar-footer">
            <button (click)="onLogout()" class="logout-btn">
                <i class="bi bi-box-arrow-left"></i>
                <span>Salir</span>
            </button>
        </div>

    </aside>

    <main class="main-content">

        <header class="top-navbar">
            <button (click)="toggleSidebar()" class="toggle-btn">
                <i class="bi bi-list"></i>
            </button>
            <div class="user-profile">
                <span>{{ usuarioNombre }}</span>
            </div>
        </header>

        <div class="page-container">
            <router-outlet></router-outlet>
        </div>

    </main>

</div>
